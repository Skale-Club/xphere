# Canonical example — inbound-call follow-up with a short delay.
# Trigger: inbound_call_to_number fires when a call reaches one of the org's
#          numbers. Scope: phone.*, contact.* are populated by the event.
# Pattern: wait node introduces a human-feeling delay before the SMS goes out.

name: missed-call-followup
description: |
  Waits 5 minutes after an inbound call, then sends an SMS to the caller
  offering to call them back.
trigger:
  type: event
  event: inbound_call_to_number

nodes:
  - id: pause
    kind: wait
    duration: "5m"

  - id: followup
    kind: send_sms
    integration: twilio
    to: "{{contact.phone}}"
    body: "Hi {{contact.first_name}}, sorry we missed your call! We'll get back to you soon. Reply STOP to opt out."

edges:
  - from: trigger
    to: pause
  - from: pause
    to: followup
