# Canonical example — a scheduled workflow that runs on a cron expression.
# Trigger: schedule fires at the configured cron time each day.
# Pattern: cron expression is in standard 5-field UTC format.
# Output:  Sends a daily digest SMS to the org's primary admin contact.

name: schedule-daily-report
description: |
  Runs every weekday morning at 8 AM UTC and sends a daily summary SMS to
  the configured admin phone number.
trigger:
  type: schedule
  config:
    cron: "0 8 * * 1-5"

nodes:
  - id: send_digest
    kind: send_sms
    integration: twilio
    # The schedule trigger exposes only trigger.fired_at — there is no
    # contact/org namespace on a cron run — so the recipient is configured
    # inline. Replace the placeholder with the admin's number in E.164.
    to: "+15555550123"
    body: "Good morning! Your daily Xphere digest is ready. Log in at https://xphere.app to review today's activity."

edges:
  - from: trigger
    to: send_digest
