# Platform-default workflow — ships to every org.
# On booking confirmed: sends a generic confirmation email to the
# attendee (only if the contact has an email address) with the
# appointment details, a link to add it to Google Calendar, and
# links to cancel or reschedule. Deliberately tenant-neutral (SCH-04)
# — no tagging or opportunity-creation nodes, since those assume
# business-specific platform state (a "customer" tag convention, a
# specific pipeline stage assumed to exist) that most orgs will not
# have configured; tenants that want those can add them via the builder.

name: Booking confirmation
description: |
  Platform-default. When a booking is confirmed, sends a confirmation
  email to the attendee (only if the contact has an email address)
  with the appointment details and links to add it to Google Calendar,
  cancel, or reschedule.
trigger:
  type: event
  event: meeting.confirmed

nodes:
  - id: check_email
    kind: condition
    expression: "meeting.attendee_contact.email != ''"

  - id: send_confirmation_email
    kind: send_tenant_email
    to: "{{meeting.attendee_contact.email}}"
    subject: "Your {{meeting.title}} appointment is confirmed"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Appointment Confirmed</title></head>
      <body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
        <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;">
              <tr>
                <td style="padding:32px 40px;">
                  <p style="margin:0 0 8px;font-size:16px;color:#333333;">Hello {{meeting.attendee_contact.first_name}},</p>
                  <h1 style="margin:0 0 8px;font-size:22px;color:#333333;">Your appointment is confirmed</h1>
                  <p style="margin:0 0 24px;font-size:15px;color:#555555;">Here are your appointment details:</p>
                  <p style="margin:4px 0;font-size:15px;color:#333333;">Date: {{meeting.starts_date}}</p>
                  <p style="margin:4px 0;font-size:15px;color:#333333;">Time: {{meeting.starts_time}}</p>
                  <p style="margin:4px 0 24px;font-size:15px;color:#333333;">Location: {{meeting.location.address}}</p>
                  <p style="margin:0 0 6px;font-size:14px;color:#333333;">Need to change your appointment?</p>
                  <p style="margin:0 0 20px;font-size:14px;">
                    <a href="https://xphere.app/booking/cancel/{{meeting.id}}" style="color:#333333;">Cancel</a>
                    &nbsp;|&nbsp;
                    <a href="https://xphere.app/booking/reschedule/{{meeting.id}}" style="color:#333333;">Reschedule</a>
                  </p>
                  <p style="margin:0 0 20px;font-size:14px;">
                    <a href="{{meeting.google_calendar_url}}" style="color:#333333;">Add to Google Calendar</a>
                  </p>
                  <p style="margin:0;font-size:14px;color:#555555;">We look forward to seeing you!</p>
                </td>
              </tr>
            </table>
          </td></tr>
        </table>
      </body>
      </html>

edges:
  - from: trigger
    to: check_email
  - from: check_email
    to: send_confirmation_email
    when: "true"
