# Platform-default workflow — ships to every org.
# Sends an SMS 1 hour before a confirmed appointment to let the contact know
# the team is on their way.

name: On our way — 1h reminder
description: |
  Platform-default. 1 hour before a confirmed appointment, sends the contact
  an SMS saying the team is on their way.
trigger:
  type: event
  event: meeting.starts_in
  config:
    offset: "-1h"

nodes:
  - id: notify
    kind: send_sms
    integration: twilio
    to: "{{meeting.attendee_contact.phone}}"
    body: "Hey {{meeting.attendee_contact.first_name}}, we're on our way and will be there in about an hour. Thanks!"

edges:
  - from: trigger
    to: notify
