# Platform-default workflow — ships to every org.
# Acknowledges a booking cancellation via SMS immediately after the event fires.

name: Confirmação de cancelamento
description: |
  Platform-default. Envia uma confirmação de cancelamento por SMS ao
  participante assim que o agendamento é cancelado.
trigger:
  type: event
  event: meeting.cancelled

nodes:
  - id: cancel_sms
    kind: send_sms
    integration: twilio
    to: "{{meeting.attendee_contact.phone}}"
    body: "Olá {{meeting.attendee_contact.name}}, seu agendamento de {{meeting.event_type.name}} foi cancelado com sucesso. Para reagendar, acesse: {{meeting.event_type.booking_url}}"

edges:
  - from: trigger
    to: cancel_sms
