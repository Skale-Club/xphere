# Platform-default tool — ships to every org (loaded per-org by the seed loader on deploy).
# Callable by name from any AI agent, voice handler, or webhook: sends a builder
# email template to a recipient with merge-tag personalization (UFE-11).
#
# CODE-ONLY: this file is committed and validated in CI (npm run workflows:validate-all).
# It is NOT applied to production in this phase.

name: send_email_template
description: |
  Sends a builder email template (from Email Templates) to a recipient, with
  merge-tag personalization, via the org's tenant Resend integration —
  honouring the unsubscribe suppression list and adding the compliance
  footer + List-Unsubscribe headers (this platform-default tool always sends
  as kind:'marketing'; the executor's 'transactional' escape hatch isn't
  reachable through a flat node config, since `kind` is the node's own
  type-discriminator key — use the send_tenant_email tool directly for a
  transactional send). Provide the template_id, the recipient email, and a
  variables object used to fill {{contact.first_name}}-style tokens in the
  template and subject. Subject is optional — it falls back to the
  template's own subject line (set in the builder's Document inspector) when
  omitted; the send fails only if neither is set. The template must be
  published unless allow_draft is set.
trigger:
  type: tool_call
  config:
    tool_name: send_email_template
    input_schema:
      template_id:
        type: string
        description: UUID of the email template to send (must have a published/saved snapshot).
        required: true
      to:
        type: string
        description: Recipient email address.
        required: true
      subject:
        type: string
        description: >-
          Subject line; supports {{variables}}. Optional — falls back to the
          template's own subject line when omitted; the send fails only if
          neither is set.
        required: false
      variables:
        type: object
        description: 'Merge-tag values, e.g. { contact: { first_name: "Ana" } }.'
        required: false
      allow_draft:
        type: boolean
        description: Send an unpublished (draft) template. Default false.
        required: false

nodes:
  - id: action
    kind: send_email_template
    template_id: "{{input.template_id}}"
    to: "{{input.to}}"
    subject: "{{input.subject}}"
    variables: "{{input.variables}}"
    allow_draft: "{{input.allow_draft}}"

edges:
  - from: trigger
    to: action
