# Platform-default workflow — ships to every org.
# Sends an SMS confirmation 24 hours before any confirmed appointment.
# Triggers via SEED-027 tick scheduler matching meeting.starts_in with offset -24h.

name: Reminder
description: |
  Platform-default. 24 hours before a confirmed appointment, sends the contact
  a personalised SMS asking them to confirm the cleaning.
trigger:
  type: event
  event: meeting.starts_in
  config:
    offset: "-24h"

nodes:
  - id: notify
    kind: send_sms
    integration: twilio
    to: "{{meeting.attendee_contact.phone}}"
    body: "Hi {{meeting.attendee_contact.first_name}}, just passing by to confirm our cleaning tomorrow at {{meeting.starts_time}}, thanks"

edges:
  - from: trigger
    to: notify
