# Coolify deploys this PREBUILT image instead of building on the VPS.
# The image is built on a 16GB GitHub Actions runner and pushed to GHCR by
# .github/workflows/build-deploy.yml, so Coolify only does `docker pull` + run.
#
# Requires in Coolify (app → Configuration):
#   - Build Pack = "Docker Compose"
#   - A private registry credential for ghcr.io (read:packages PAT) so the
#     private image can be pulled.
#   - Map the prod domain(s) to the `app` service in "Docker Compose Domains".
#
# Coolify auto-injects the app's configured environment variables into this
# service, so secrets are NOT duplicated here — only runtime hints the image
# expects are pinned.
services:
  app:
    image: ghcr.io/skale-club/xphere:latest
    # Force a registry pull on every deploy. Without this, `docker compose up`
    # reuses the locally-cached `:latest` image, so Coolify keeps running the
    # stale image even after CI pushes a new one to GHCR.
    pull_policy: always
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
