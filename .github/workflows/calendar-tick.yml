name: Calendar Tick

# Drives time-based workflow triggers (SEED-027 Phase C):
#   - meeting.starts_in (-5m, -1h, -24h, -2d reminders)
#   - meeting.ended
#
# Moved off Vercel Cron (Hobby plan caps frequency at 1/day) onto
# GitHub Actions. The endpoint is idempotent: scheduled_workflow_ticks
# has a UNIQUE (workflow_id, booking_id, event, fired_minute) so
# duplicate firings are dropped at the DB level.

on:
  schedule:
    # GitHub Actions cron minimum is 1 minute, but scheduled runs can be
    # delayed by minutes under load. The endpoint's idempotency table
    # absorbs duplicate firings, so we use */5 for reliability — a 5-min
    # window still covers the smallest meeting.starts_in offset (-5m)
    # because the window logic in route.ts looks at [now, now + 1min).
    #
    # If you need tighter granularity, drop to '* * * * *' but expect
    # drift; or upgrade Vercel Pro and restore vercel.json.
    - cron: '*/5 * * * *'
  workflow_dispatch:        # manual trigger

concurrency:
  group: calendar-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Fire calendar-tick endpoint
        run: |
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 60 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/calendar-tick")
          echo "Status: $STATUS"
          echo "Body: $(cat /tmp/body)"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "OK"
          else
            echo "Tick failed with status $STATUS" >&2
            exit 1
          fi
