name: Build and Deploy

# CI→GHCR→Coolify pipeline. Builds Docker image off-VPS (GitHub runners
# have 16GB RAM; the 8GB CX32 OOM-thrashes on next build), pushes to GHCR.
#
# DEPLOY IS MANUAL (intentional): pushing to main builds + pushes the image to
# GHCR but does NOT republish the live site. Coolify's Docker Compose build
# pack has no zero-downtime/rolling update, so every auto-deploy briefly drops
# the site ("no available server" from Traefik). To avoid surprise outages, the
# Coolify trigger below only fires on a MANUAL run.
#
# To publish a new version to production, either:
#   • GitHub → Actions → "Build and Deploy" → Run workflow (branch: main), or
#   • Coolify UI → xphere app → Redeploy
# Both pull ghcr.io/skale-club/xphere:latest and restart (brief downtime).
#
# Zero-downtime follow-up: migrate the Coolify app off the Docker Compose build
# pack (blocked by a Coolify v4.1.2 quirk that recycles Docker Image apps).
#
# ── Change these two lines when copying to another repo ──────────────────────
#   IMAGE_NAME   ghcr.io/skale-club/<app-name>
#   APP_UUID     Coolify resource UUID (Settings → UUID in the app UI)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Single source of truth for deploys (deploy.yml was removed to stop the
# double Coolify trigger). A newer push cancels an in-flight build so stale
# deploys never queue.
concurrency:
  group: build-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/skale-club/xphere
  APP_UUID: c70jg4t9o88x985dctsl57qy
  COOLIFY_BASE: https://coolify.skale.club

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}

      # MANUAL ONLY: this step is skipped on push so auto-publishing never drops
      # the live site. It runs only when you trigger the workflow by hand
      # (workflow_dispatch), giving you control over WHEN the brief deploy
      # downtime happens.
      - name: Trigger Coolify deploy (pull prebuilt image) — manual only
        if: github.event_name == 'workflow_dispatch'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::warning::COOLIFY_TOKEN not set — skipping Coolify trigger."
            echo "Image is built and pushed to GHCR. Set COOLIFY_TOKEN secret to auto-deploy."
            exit 0
          fi
          echo "Triggering Coolify pull for app ${APP_UUID}…"
          curl --fail-with-body -sS --retry 3 --retry-all-errors \
            "${COOLIFY_BASE}/api/v1/deploy?uuid=${APP_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"
          echo
          echo "Deploy queued. Coolify will pull ghcr.io/…:latest and restart."

      - name: Build complete (push — no auto-deploy)
        if: github.event_name == 'push'
        run: |
          echo "✓ Image built and pushed to GHCR (ghcr.io/skale-club/xphere:latest)."
          echo "Auto-deploy is OFF to avoid surprise downtime."
          echo "To publish: re-run this workflow manually, or click Redeploy in Coolify."
