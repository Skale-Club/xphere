name: Website Analyzer Cron

# Processes pending/stale website analyses for prospect accounts (up to 10/run).
# Fires every 10 minutes so newly-ingested prospects get analyzed promptly.

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:          # manual trigger

concurrency:
  group: website-analyzer
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fire website-analyzer endpoint
        run: |
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" \
            --connect-timeout 15 --max-time 60 \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/website-analyzer")
          echo "Status: $STATUS"
          echo "Body: $(cat /tmp/body)"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "OK"
          else
            echo "website-analyzer cron failed with status $STATUS" >&2
            exit 1
          fi
