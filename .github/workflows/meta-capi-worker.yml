name: Meta CAPI Worker

# Drains the Meta Conversions API outbox (meta_capi_events) every 5 minutes.
# Sends queued Lead / QualifiedLead / Purchase events to each org's dataset
# with retry/backoff. Fails closed: if required secrets are absent the job
# no-ops (green). Configure these repo secrets to enable:
#   SUPABASE_SERVICE_ROLE_KEY, ENCRYPTION_SECRET, META_SYSTEM_USER_TOKEN
# and repo variable NEXT_PUBLIC_SUPABASE_URL.
#
# NOTE: run this OR a Hetzner crontab — not both, or events send twice
# (harmless thanks to event_id dedup, but wasteful).

on:
  workflow_dispatch:
    inputs:
      org_id:
        description: 'Process a single org (optional)'
        required: false
      test:
        description: 'Send with each org test_event_code (Events Manager → Test Events)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — log, do not POST to Meta'
        type: boolean
        default: false
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes

concurrency:
  group: meta-capi-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drain:
    name: Drain CAPI outbox
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check configuration
        id: cfg
        env:
          SRK: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENC: ${{ secrets.ENCRYPTION_SECRET }}
        run: |
          if [ -z "$SRK" ] || [ -z "$ENC" ]; then
            echo "Required secrets missing — skipping (no-op)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.cfg.outputs.configured == 'true'
        run: npm ci

      - name: Run meta-capi-worker
        if: steps.cfg.outputs.configured == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          ORG_ID: ${{ inputs.org_id }}
          TEST: ${{ inputs.test }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$ORG_ID" ]; then ARGS="$ARGS --org $ORG_ID"; fi
          if [ "$TEST" = "true" ]; then ARGS="$ARGS --test"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx scripts/meta-capi-worker.ts $ARGS
