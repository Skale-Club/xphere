name: Global Knowledge Notion Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: global-knowledge-notion-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Drain durable Notion sync queue
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL:-https://xphere.app}/api/cron/global-knowledge-notion"
